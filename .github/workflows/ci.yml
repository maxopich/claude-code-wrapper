name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Pinned to windows-2022 (was windows-latest): the newer windows-latest
        # image ships Visual Studio 18 (2026), which the node-gyp bundled with
        # Node 20 can't parse (reads it as version "undefined"). better-sqlite3's
        # `prebuild-install || node-gyp rebuild` then dies in the compile
        # fallback at the "Rebuild native modules" step, before any test runs.
        # VS 2022 on windows-2022 is node-gyp-recognised. Revert to
        # windows-latest once node-gyp/the image stabilise. The `required`
        # aggregate below keys off the matrix result, not per-OS names, so this
        # rename needs no branch-protection change.
        os: [ubuntu-latest, windows-2022]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `.npmrc` sets ignore-scripts=true; the explicit flag is belt-and-
        # braces. A malicious transitive postinstall must not execute on CI.
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        # better-sqlite3 is the only legitimate native dep. `.npmrc` sets
        # ignore-scripts=true which suppresses install lifecycle scripts
        # for `npm rebuild` too, so we opt back in explicitly here.
        # prebuild-install pulls a prebuilt binary on both Linux and
        # Windows x64 (no compiler toolchain needed) — this is also the
        # documented cross-platform `npm run setup` step.
        run: npm rebuild better-sqlite3 --foreground-scripts --ignore-scripts=false

      - name: Lockfile drift check
        # Catches the case where a contributor ran `npm install` locally
        # (mutating package-lock.json) instead of `npm ci`, and the diff
        # slipped into the PR unnoticed.
        run: git diff --exit-code package-lock.json

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Audit dependencies
        # Fails the job on high or critical advisories. Moderate/low are
        # reported but don't block — dependabot handles those on a weekly
        # cadence. If a sustained `high` CVE has no fix yet, temporarily
        # set `continue-on-error: true` here on a per-PR basis.
        run: npm audit --audit-level=high

      - name: Test
        run: npm test

      - name: Security regression tests
        # All security cases are Vitest unit tests tagged [security]. The
        # old F6/R3 bats shell tests were deleted with the bus scripts in
        # the pure-SDK rewrite, so there is no longer a bats dependency —
        # this step runs identically on Linux and Windows.
        run: npm run test:security

      - name: DB migration smoke
        # Verifies migrations apply cleanly on a fresh DB. The runner is
        # ephemeral so the sqlite file is always brand new.
        run: npm run smoke

      - name: Build
        # Catches Vite-specific build failures and tsc --emit errors that
        # --noEmit doesn't surface (e.g. import resolution, asset pipeline).
        run: npm run build

      - name: WS protocol smoke (mock, cross-platform)
        # Pure-Node orchestrator (src/ci_smoke.ts): spawns the MOCK=1
        # server, polls /health over fetch, runs ws_smoke, tears it down.
        # Hermetic (isolated HOME/USERPROFILE) and shell-free, so it runs
        # identically on ubuntu-latest and windows-latest — no `&` / `nc` /
        # `timeout` / `kill` (the old Linux-only bash pipeline is gone).
        run: npm --workspace server exec tsx src/ci_smoke.ts

  # Stable required-status-check context. Branch protection on `main`
  # requires the bare context "Lint, Typecheck, Test", but the matrix
  # above reports per-OS contexts ("... (ubuntu-latest)" / "...
  # (windows-latest)"), so the bare name is never produced and the
  # required check hangs forever in "Expected — waiting for status".
  # This 1-step aggregator emits exactly that context and is green iff
  # every matrix leg passed — so the gate keeps working even if the
  # matrix gains/renames OSes later, with no branch-protection edits.
  required:
    name: Lint, Typecheck, Test
    needs: [quality]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Require every matrix leg to have passed
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "quality matrix did not succeed (result=${{ needs.quality.result }})"
            exit 1
          fi
          echo "All matrix legs passed."
