name: Dependabot auto-merge

# Auto-enable merge on dependabot patch PRs once their CI is green.
# Minor and major bumps still require manual review — they get the same
# CI gate but no auto-merge.
#
# Prerequisites (configured at the repo level, not in this file):
#   - "Allow auto-merge" enabled in repo settings.
#   - Branch protection on `main` with required status checks. Without
#     this, auto-merge fires immediately, which defeats the gate.
#
# Safety note on pull_request_target. This trigger runs with repo-write
# perms even on fork PRs, which is the classic foot-gun. This workflow is
# safe specifically because:
#   1. The job-level `if:` gates every step on
#      `github.event.pull_request.user.login == 'dependabot[bot]'`
#      (the PR author field, set at open time and not spoofable via
#      workflow re-runs — `github.actor` is, which is why we don't use it).
#   2. No PR-head code is ever checked out. The only actions called are
#      `dependabot/fetch-metadata` (reads PR metadata) and `gh pr merge`
#      (operates on the merge queue). Do NOT add `actions/checkout` here
#      without re-evaluating this trust posture.
#   3. The merge-enable is filtered to `version-update:semver-patch` only;
#      minor and major bumps still require a human reviewer.

on: pull_request_target # zizmor: ignore[dangerous-triggers]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
