name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-and-quality
          # Smoke scripts are dev-only CLIs that connect to our own localhost
          # WebSocket. CodeQL flags branches/logs on the WS payload as
          # user-controlled-bypass / log-injection — they're false positives
          # in this context (we control both ends, server is bound to 127.0.0.1
          # with Origin gating). Skip the smoke harnesses from analysis.
          #
          # The `js/missing-rate-limiting` query flags Express route handlers
          # that perform "expensive" ops (file reads, DB queries) without an
          # express-rate-limit-style middleware. For Cebab this is the wrong
          # threat model: the HTTP server binds to 127.0.0.1, every route is
          # gated on Origin+Host AND a per-launch random token written to
          # ~/.cebab/auth-token (mode 0600), and the only legitimate caller
          # is the operator themselves on the same machine. A "rate limit"
          # against the operator pulling their own data is theater. If the
          # day comes that Cebab gates a non-operator caller (multi-user,
          # remote, OAuth-3rd-party), drop this exclude and revisit.
          config: |
            paths-ignore:
              - 'server/src/*_smoke.ts'
            query-filters:
              - exclude:
                  id: js/missing-rate-limiting

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:${{ matrix.language }}'
