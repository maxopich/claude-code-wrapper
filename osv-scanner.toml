# Baseline ignore-list for OSV-Scanner. Matches the existing
# `npm audit --audit-level=high` policy in ci.yml — medium/low advisories
# are reported but don't block. Each entry has an `ignoreUntil` so this
# file forces a re-evaluation in 3 months if Dependabot hasn't already
# retired the entry by bumping the affected dep.
#
# When Dependabot opens a PR to bump one of these packages past its
# `FIXED VERSION`, REMOVE the entry rather than extending the date.
#
# Inventory captured at PR #39 (T2.2, 2026-05-14):
#   @anthropic-ai/sdk 0.81.0 → 0.91.1
#   hono              4.12.17 → 4.12.18
#   ip-address        10.1.0 → 10.1.1
# All transitives; no direct package.json change required.

[[IgnoredVulns]]
