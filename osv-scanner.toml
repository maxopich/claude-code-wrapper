ignoreUntil = "2026-08-14T00:00:00Z"
reason = "@anthropic-ai/sdk 0.81.0 (transitive of @anthropic-ai/claude-agent-sdk). Medium (CVSS 4.8). Fix in 0.91.1. Awaiting upstream bump."

